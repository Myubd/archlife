name: Backend CI (FastAPI)
# archlife-fastapi 配下に変更があった push / PR で実行される
on:
  push:
    branches: [main]
    paths:
      - "archlife-fastapi/**"
  pull_request:
    branches: [main]
    paths:
      - "archlife-fastapi/**"

jobs:
  fastapi-test:
    name: FastAPI Unit & Smoke Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: archlife-fastapi
    steps:
      - name: リポジトリを取得(submoduleも含める)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e local_ai_core
          pip install pytest

      - name: main.py の構文チェック
        run: python -c "import ast; ast.parse(open('main.py', encoding='utf-8').read())"

      - name: テストを実行
        run: pytest tests/ -v
