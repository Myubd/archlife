name: Backend CI

# archlife-backend 配下に変更があった push / PR で実行される
on:
  push:
    branches: [main]
    paths:
      - "archlife-backend/**"
  pull_request:
    branches: [main]
    paths:
      - "archlife-backend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: archlife-backend

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: archlife-backend/package-lock.json

      - name: 依存関係をインストール
        run: npm ci

      - name: server.js の構文チェック
        run: node --check server.js

      # テストスクリプトを package.json に追加したら、以下を有効化する
      # - name: テスト実行
      #   run: npm test
