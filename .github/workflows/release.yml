name: Release

# "v1.0.0" のようなタグを push すると、
# ワンクリックでインストールできる ArchLifeOS デスクトップ版(setup.exe)を
# ビルドして GitHub Release に自動公開する。
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: フロントエンドの依存関係をインストール
        working-directory: archlife-frontend
        run: npm ci

      - name: フロントエンドをビルド(dist生成、APIはlocalhostに固定)
        working-directory: archlife-frontend
        run: npm run build:electron

      - name: バックエンドの依存関係をインストール(better-sqlite3含む)
        working-directory: archlife-backend
        run: npm ci --omit=dev

      - name: Electronアプリの依存関係をインストール
        working-directory: electron-app
        run: npm ci

      - name: better-sqlite3をElectron用にネイティブ再ビルド
        working-directory: electron-app
        run: npx @electron/rebuild -f -w better-sqlite3 --module-dir ../archlife-backend

      - name: インストーラー(setup.exe)をビルドしてGitHub Releaseに公開
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
